<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#c77dab">
  <title>{% block title %}{{ t('app_name') }}{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    :root {
      --bg: #faf6f0;
      --surface: #ffffff;
      --accent: #c77dab;
      --accent-dark: #a95f8f;
      --accent-soft: #f3e2ed;
      --gold: #b99856;
      --focus: #2e7d32;
      --avoid: #c62828;
      --text: #3a2b33;
      --muted: #8a7580;
      --border: #e6d9d0;
      --danger: #c62828;
      --radius: 14px;
      --serif: Georgia, 'Playfair Display', 'Times New Roman', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      font-size: 18px;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .brand img { height: 44px; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
    .brand-name { font-family: var(--serif); font-size: 1.35rem; font-weight: 700; color: var(--accent-dark); }
    .brand-sub { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.08em; }
    nav .nav-links { display: flex; gap: 1rem; align-items: center; }
    nav .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 600; }
    nav .nav-links a:hover { color: var(--accent-dark); }
    .container { max-width: 900px; width: 100%; margin: 0 auto; padding: 1.25rem 1rem 2rem; flex: 1; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.4rem;
      margin-bottom: 1.1rem;
    }
    .section-banner {
      background: var(--accent);
      color: #3a232f;
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      margin: 1.4rem 0 1rem;
      text-align: center;
      font-family: var(--serif);
      font-size: 1.25rem;
      letter-spacing: 0.12em;
    }
    .section-banner .en { opacity: 0.8; }
    h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent-dark); }
    h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--gold); }
    .q-label { display: block; margin: 1.1rem 0 0.5rem; }
    .q-label:first-child { margin-top: 0; }
    .q-cs { display: block; font-weight: 700; font-size: 1.05rem; }
    .q-en { display: block; font-family: var(--serif); color: var(--muted); font-size: 0.95rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.6rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      min-height: 52px;
      touch-action: manipulation;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:hover { background: var(--accent-dark); }
    .btn:active { transform: scale(0.97); }
    .btn--outline { background: transparent; border: 2px solid var(--accent); color: var(--accent-dark); }
    .btn--outline:hover { background: var(--accent-soft); }
    .btn--danger { background: var(--danger); }
    .btn--danger:hover { background: #a01f1f; }
    .btn--full { width: 100%; }
    .btn--sm { padding: 0.45rem 1rem; font-size: 0.9rem; min-height: 44px; }
    input[type=text], input[type=email], input[type=tel], textarea {
      font-family: inherit;
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1.05rem;
      background: #fff;
      color: var(--text);
      margin-top: 0.3rem;
    }
    input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .flash {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #1b5e20;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .flash.error { background: #ffebee; border-color: #ef9a9a; color: #b71c1c; }
    label { font-weight: 600; font-size: 0.95rem; display: block; }
    footer {
      text-align: center;
      color: var(--muted);
      font-family: var(--serif);
      font-size: 0.85rem;
      padding: 1.25rem 1rem 1.75rem;
    }
    @media (min-width: 768px) {
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem; }
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="{% if kiosk %}/kiosk{% elif is_admin %}/admin{% elif user %}/profile{% else %}/{% endif %}" class="brand">
      <img src="/static/logo.png" alt="" onerror="this.remove()">
      <span class="brand-text">
        <span class="brand-name">{{ t('app_name') }}</span>
        <span class="brand-sub">{{ t('brand_sub') }}</span>
      </span>
    </a>
    <div class="nav-links">
      {% if user and not kiosk %}
        {% if is_admin %}<a href="/admin">{{ t('admin_clients') }}</a>{% endif %}
        <a href="/logout">{{ t('logout') }}</a>
      {% endif %}
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>{{ t('footer') }}</footer>
  {% block scripts %}{% endblock %}
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
